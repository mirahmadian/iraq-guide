<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>راهنمای کاروان | عراق</title>
  <meta name="description" content="راهنمای دیجیتال مدیران کاروان در عراق – ستادها، درمانگاه‌ها، شماره‌های تماس">
  <meta name="theme-color" content="#F0F7F2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="کاروان عراق">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="app-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #F0F7F2;
      --surface:   #E2F0E6;
      --card:      #FFFFFF;
      --card2:     #F4FBF6;
      --gold:      #2E7D5E;
      --gold-l:    #3A9B74;
      --gold-dim:  rgba(46,125,94,0.10);
      --gold-dim2: rgba(46,125,94,0.05);
      --emerald-l: #2A9D6E;
      --ruby:      #B83232;
      --ruby-l:    #E74C3C;
      --blue-l:    #5A9CF5;
      --green-wa:  #25D366;
      --text:      #0A2A1A;
      --muted:     #3A6B52;
      --dim:       #6B9B7F;
      --border:    rgba(46,125,94,0.20);
      --border-s:  rgba(46,125,94,0.30);
      --shadow:    0 4px 20px rgba(0,0,0,0.08);
      --r:         16px;
      --r-sm:      10px;
      --font:      'Vazirmatn', sans-serif;
    }
    [data-theme="dark"] {
      --bg:        #0A1F14;
      --surface:   #0E2A1C;
      --card:      #133523;
      --card2:     #16482F;
      --gold-dim:  rgba(46,125,94,0.12);
      --gold-dim2: rgba(46,125,94,0.06);
      --text:      #F5F5F0;
      --muted:     #9BBFAE;
      --dim:       #5A8A72;
      --border:    rgba(46,125,94,0.20);
      --border-s:  rgba(46,125,94,0.35);
      --shadow:    0 6px 28px rgba(0,0,0,0.5);
    }

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{
      font-family:var(--font);
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='rgba(46,125,94,0.08)' stroke-width='0.8'%3E%3Cpolygon points='50%2C8 59%2C35 88%2C35 65%2C53 74%2C80 50%2C62 26%2C80 35%2C53 12%2C35 41%2C35'/%3E%3Ccircle cx='50' cy='50' r='22'/%3E%3C/g%3E%3C/svg%3E");
      background-size:100px 100px;
    }
    body::after{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 5%,rgba(46,125,94,0.06) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 95%,rgba(46,125,94,0.05) 0%,transparent 60%);
    }

    .app-wrapper{
      position:relative;z-index:1;
      max-width:480px;margin:0 auto;
      min-height:100vh;display:flex;flex-direction:column;
    }

    /* ── HEADER ── */
    .header{
      position:sticky;top:0;z-index:100;
      padding:14px 14px 6px;
      background:linear-gradient(180deg,var(--bg) 75%,transparent);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    }
    .header-inner{
      display:flex;align-items:center;justify-content:space-between;
      background:var(--surface);border:1px solid var(--border-s);
      border-radius:var(--r);padding:11px 14px;box-shadow:var(--shadow);
    }
    .header-brand{display:flex;align-items:center;gap:10px}
    .brand-icon{
      width:42px;height:42px;border-radius:12px;
      background:linear-gradient(135deg,var(--gold) 0%,var(--gold-l) 100%);
      display:flex;align-items:center;justify-content:center;font-size:22px;
      box-shadow:0 2px 12px rgba(46,125,94,0.35);flex-shrink:0;
    }
    .brand-text h1{font-size:14px;font-weight:800;color:var(--text);line-height:1.2}
    .brand-text p{font-size:10.5px;color:var(--muted);font-weight:400;margin-top:1px}
    .header-actions{display:flex;gap:7px;align-items:center}
    .icon-btn{
      width:36px;height:36px;border:1px solid var(--border);
      border-radius:9px;background:var(--card);color:var(--muted);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:15px;transition:all .2s;
    }
    .icon-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
    .hajj-logo{
      width:36px;height:36px;border-radius:9px;object-fit:contain;
      background:var(--card);border:1px solid var(--border);
      padding:5px;flex-shrink:0;
    }
    [data-theme="dark"] .hajj-logo{filter:brightness(0) invert(1)}

    /* ── SEARCH ── */
    .search-wrap{
      padding:0 14px 8px;
    }
    .search-box{
      display:flex;align-items:center;gap:9px;
      background:var(--card);border:1px solid var(--border-s);
      border-radius:var(--r-sm);padding:10px 13px;
      box-shadow:var(--shadow);transition:border-color .2s;
    }
    .search-box:focus-within{border-color:var(--gold)}
    .search-ico{font-size:16px;color:var(--dim);flex-shrink:0}
    .search-box input{
      flex:1;border:none;background:transparent;
      font-family:var(--font);font-size:13px;color:var(--text);
      outline:none;direction:rtl;
    }
    .search-box input::placeholder{color:var(--dim)}
    .search-clear{
      background:none;border:none;cursor:pointer;
      font-size:13px;color:var(--dim);padding:0;display:none;
    }
    .search-clear.show{display:block}
    .search-results{
      display:none;margin:0 14px 10px;
      background:var(--card);border:1px solid var(--border-s);
      border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--shadow);
    }
    .search-results.show{display:block}
    .sr-header{
      padding:8px 14px;font-size:10px;color:var(--dim);font-weight:600;
      border-bottom:1px solid var(--border);background:var(--card2);
    }
    .sr-empty{padding:14px;text-align:center;font-size:12px;color:var(--dim);font-style:italic}

    /* ── INSTALL BANNER ── */
    .install-banner{
      display:none;margin:0 14px 8px;
      background:linear-gradient(135deg,rgba(46,125,94,0.13),rgba(46,125,94,0.06));
      border:1px solid var(--border-s);border-radius:var(--r-sm);
      padding:11px 13px;align-items:center;gap:11px;
    }
    .install-banner.show{display:flex}
    .install-text{flex:1;font-size:11.5px;color:var(--muted);line-height:1.55}
    .install-text strong{display:block;font-size:12.5px;color:var(--gold);margin-bottom:2px}
    .install-btn{
      padding:8px 14px;background:var(--gold);color:#FFF;
      border:none;border-radius:8px;font-family:var(--font);
      font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;transition:background .2s;
    }
    .install-btn:hover{background:var(--gold-l)}

    /* ── EMERGENCY ── */
    .emergency{
      margin:0 14px 8px;
      background:linear-gradient(135deg,rgba(183,50,50,0.13),rgba(183,50,50,0.07));
      border:1px solid rgba(183,50,50,0.28);border-radius:var(--r-sm);overflow:hidden;
    }
    .emergency-head{
      display:flex;align-items:center;justify-content:space-between;
      padding:11px 14px;cursor:pointer;user-select:none;
    }
    .emergency-label{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--ruby-l)}
    .e-pulse{width:8px;height:8px;background:var(--ruby-l);border-radius:50%;animation:epulse 1.6s infinite}
    @keyframes epulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.75)}}
    .emergency-arrow{color:var(--ruby-l);font-size:11px;transition:transform .3s}
    .emergency.open .emergency-arrow{transform:rotate(180deg)}
    .emergency-body{display:none;padding:0 14px 13px}
    .emergency.open .emergency-body{display:block}
    .e-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .e-item{background:rgba(183,50,50,0.09);border:1px solid rgba(183,50,50,0.18);border-radius:8px;padding:10px;text-align:center}
    .e-label{font-size:10px;color:rgba(231,76,60,.75);margin-bottom:3px}
    .e-num{font-size:20px;font-weight:900;color:var(--ruby-l);letter-spacing:1px}

    /* ── GLOBAL INSURANCE ── */
    .global-ins{
      margin:0 14px 10px;
      background:linear-gradient(135deg,rgba(90,156,245,0.10),rgba(90,156,245,0.05));
      border:1px solid rgba(90,156,245,0.25);border-radius:var(--r-sm);overflow:hidden;
    }
    .global-ins-head{
      display:flex;align-items:center;gap:9px;padding:10px 13px;
      border-bottom:1px solid rgba(90,156,245,0.15);
    }
    .global-ins-ico{width:32px;height:32px;border-radius:8px;background:rgba(90,156,245,0.14);
      display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .global-ins-title{font-size:12px;font-weight:700;color:var(--blue-l);flex:1}
    .global-badge{font-size:9.5px;padding:2px 8px;border-radius:5px;font-weight:600;
      background:rgba(90,156,245,0.12);color:var(--blue-l);border:1px solid rgba(90,156,245,0.28)}
    .global-ins-body{padding:9px 13px}
    .gin-row{display:flex;align-items:center;gap:10px}
    .gin-avatar{width:34px;height:34px;border-radius:9px;background:rgba(90,156,245,0.10);
      border:1px solid rgba(90,156,245,0.2);display:flex;align-items:center;justify-content:center;
      font-size:15px;flex-shrink:0}
    .gin-info{flex:1;min-width:0}
    .gin-role{font-size:10px;color:var(--dim);margin-bottom:2px}
    .gin-name{font-size:11px;color:var(--muted)}
    .gin-phone{font-size:14px;font-weight:700;color:var(--text);direction:ltr;text-align:right;letter-spacing:.5px}
    .gin-acts{display:flex;gap:5px;flex-shrink:0}

    /* ── LAST UPDATE BADGE ── */
    .update-badge{
      margin:0 14px 8px;
      display:flex;align-items:center;gap:7px;
      background:var(--gold-dim2);border:1px solid var(--border);
      border-radius:8px;padding:7px 12px;
    }
    .update-badge span{font-size:11px;color:var(--dim)}
    .update-badge strong{font-size:11px;color:var(--gold);font-weight:700}

    /* ── TABS ── */
    .tabs-wrap{
      padding:0 14px;margin-bottom:10px;
      position:sticky;top:76px;z-index:90;
    }
    .tabs{
      display:flex;gap:5px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r);padding:5px;box-shadow:var(--shadow);
    }
    .tab{
      flex:1;padding:9px 4px;border:none;border-radius:9px;
      background:transparent;color:var(--muted);
      font-family:var(--font);font-size:11.5px;font-weight:600;
      cursor:pointer;transition:all .22s;display:flex;flex-direction:column;
      align-items:center;gap:2px;line-height:1.2;
    }
    .tab-icon{font-size:17px}
    .tab.active{
      background:linear-gradient(135deg,var(--gold),var(--gold-l));
      color:#FFFFFF;box-shadow:0 2px 14px rgba(46,125,94,0.32);
    }

    /* ── CONTENT ── */
    .content{flex:1;padding:0 14px 110px}
    .city-sec{display:none}
    .city-sec.active{display:block;animation:fadeUp .28s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .city-hero{
      margin-bottom:14px;padding:18px 16px;
      background:linear-gradient(135deg,var(--surface),var(--card2));
      border:1px solid var(--border-s);border-radius:var(--r);
      text-align:center;position:relative;overflow:hidden;
    }
    .city-hero::before{
      content:'';position:absolute;top:-40px;right:-40px;
      width:130px;height:130px;border-radius:50%;
      background:radial-gradient(circle,rgba(46,125,94,0.12),transparent 70%);
    }
    .hero-name{font-size:24px;font-weight:900;color:var(--gold);margin-bottom:3px;position:relative;z-index:1}
    .hero-arabic{font-size:12px;color:var(--muted);font-weight:400;position:relative;z-index:1;line-height:1.6}

    /* ── CARDS ── */
    .sec-card{
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--r);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);
    }
    .sec-head{
      display:flex;align-items:center;gap:10px;padding:13px 15px;
      border-bottom:1px solid var(--border);
      background:linear-gradient(135deg,var(--card),var(--card2));
    }
    .sec-ico{
      width:38px;height:38px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
    }
    .ico-hq{background:linear-gradient(135deg,rgba(46,125,94,.18),rgba(46,125,94,.08))}
    .ico-clinic{background:linear-gradient(135deg,rgba(46,125,94,.18),rgba(46,125,94,.08))}
    .ico-consulate{background:linear-gradient(135deg,rgba(184,50,50,.18),rgba(184,50,50,.08))}
    .sec-info{flex:1}
    .sec-info h3{font-size:13.5px;font-weight:700;color:var(--text)}
    .badge{font-size:10px;padding:2px 9px;border-radius:6px;font-weight:600;border:1px solid;flex-shrink:0}
    .badge-gold{background:var(--gold-dim);color:var(--gold);border-color:var(--border-s)}
    .badge-green{background:rgba(46,125,94,.13);color:var(--emerald-l);border-color:rgba(46,125,94,.28)}
    .badge-blue{background:rgba(90,156,245,.12);color:var(--blue-l);border-color:rgba(90,156,245,.28)}
    .badge-ruby{background:rgba(184,50,50,.13);color:#F08080;border-color:rgba(184,50,50,.28)}

    .addr-row{
      display:flex;align-items:flex-start;gap:10px;
      padding:11px 15px;border-bottom:1px solid var(--border);
    }
    .addr-ico{
      width:28px;height:28px;border-radius:7px;background:var(--gold-dim);
      display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px;
    }
    .addr-lbl{font-size:10px;color:var(--dim);font-weight:500;margin-bottom:3px}
    .addr-txt{font-size:12.5px;color:var(--muted);line-height:1.75}

    .map-row{display:flex;gap:7px;padding:9px 15px;border-bottom:1px solid var(--border)}
    .map-btn{
      flex:1;padding:9px 6px;border-radius:9px;border:1px solid;
      background:transparent;font-family:var(--font);font-size:11px;font-weight:600;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      gap:5px;text-decoration:none;transition:all .18s;
    }
    .map-g{border-color:rgba(90,156,245,.28);color:var(--blue-l);background:rgba(90,156,245,.06)}
    .map-g:hover{background:rgba(90,156,245,.14)}
    .map-n{border-color:var(--border-s);color:var(--gold);background:var(--gold-dim2)}
    .map-n:hover{background:var(--gold-dim)}

    /* ── CONTACTS ── */
    .divider-lbl{
      padding:10px 15px 5px;font-size:10px;color:var(--dim);font-weight:600;
      letter-spacing:.5px;text-transform:uppercase;border-top:1px solid var(--border);
    }
    .c-item{
      display:flex;align-items:center;gap:10px;
      padding:10px 15px;border-bottom:1px solid var(--border);
      transition:background .15s;
    }
    .c-item:last-child{border-bottom:none}
    .c-item:hover{background:var(--card2)}
    .c-avatar{
      width:36px;height:36px;border-radius:10px;
      background:var(--gold-dim2);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;
    }
    .c-info{flex:1;min-width:0}
    .c-role{font-size:10.5px;color:var(--dim);font-weight:500;margin-bottom:2px}
    .c-name{font-size:11px;color:var(--muted);margin-top:1px}
    .c-phone{font-size:14.5px;font-weight:700;color:var(--text);direction:ltr;text-align:right;letter-spacing:.5px}
    .c-acts{display:flex;gap:5px;flex-shrink:0}
    .act{
      width:33px;height:33px;border-radius:8px;border:1px solid;
      background:transparent;cursor:pointer;display:flex;align-items:center;
      justify-content:center;text-decoration:none;transition:all .18s;
    }
    .act-call{border-color:rgba(46,125,94,.3);color:var(--emerald-l)}
    .act-call:hover{background:rgba(46,125,94,.15);border-color:var(--emerald-l)}
    .act-wa{border-color:rgba(37,211,102,.28);color:var(--green-wa)}
    .act-wa:hover{background:rgba(37,211,102,.1);border-color:var(--green-wa)}
    .act-cp{border-color:var(--border);color:var(--muted)}
    .act-cp:hover,.act-cp.done{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}

    /* WhatsApp SVG icon */
    .wa-icon{width:17px;height:17px;display:block}

    /* ── BOTTOM BAR ── */
    .bot-bar{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:480px;z-index:100;
      padding:10px 14px max(12px,env(safe-area-inset-bottom)) 14px;
      background:linear-gradient(0,var(--bg) 65%,transparent);
    }
    .bot-inner{display:flex;gap:8px}
    .bot-btn{
      flex:1;padding:13px;border-radius:var(--r-sm);border:1px solid var(--border);
      background:var(--card);font-family:var(--font);font-size:12.5px;font-weight:600;
      color:var(--muted);cursor:pointer;display:flex;align-items:center;
      justify-content:center;gap:6px;transition:all .2s;box-shadow:var(--shadow);
    }
    .bot-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
    .bot-btn.prime{
      background:linear-gradient(135deg,var(--gold),var(--gold-l));
      color:#FFFFFF;border-color:transparent;font-weight:800;
      box-shadow:0 3px 16px rgba(46,125,94,0.3);
    }

    /* ── MODAL / QR ── */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.72);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      z-index:200;display:none;align-items:flex-end;justify-content:center;
    }
    .overlay.open{display:flex}
    .modal{
      background:var(--surface);border:1px solid var(--border-s);
      border-radius:22px 22px 0 0;width:100%;max-width:480px;
      padding:20px 22px max(22px,env(safe-area-inset-bottom)) 22px;
      animation:slideUp .3s ease;
    }
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-handle{width:38px;height:4px;background:var(--border-s);border-radius:2px;margin:0 auto 18px}
    .modal-title{font-size:16px;font-weight:800;color:var(--text);text-align:center;margin-bottom:18px}
    .qr-wrap{
      display:flex;justify-content:center;padding:16px;
      background:#fff;border-radius:14px;margin-bottom:12px;
    }
    .qr-url{text-align:center;font-size:10.5px;color:var(--muted);direction:ltr;word-break:break-all;margin-bottom:16px}
    .modal-close{
      width:100%;padding:13px;border-radius:11px;border:1px solid var(--border);
      background:var(--card);color:var(--muted);font-family:var(--font);
      font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;
    }
    .modal-close:hover{border-color:var(--gold);color:var(--gold)}

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:95px;left:50%;
      transform:translateX(-50%) translateY(16px);
      background:var(--card);border:1px solid var(--border-s);
      border-radius:100px;padding:9px 20px;
      font-size:12.5px;font-weight:700;color:var(--gold);
      box-shadow:var(--shadow);opacity:0;transition:all .3s;
      z-index:300;white-space:nowrap;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── FOOTER ── */
    .footer{
      margin:20px 14px 130px;
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--r);padding:18px 16px;text-align:center;
    }
    .footer-bismillah{font-size:15px;color:var(--gold);font-weight:700;margin-bottom:10px;letter-spacing:.5px}
    .footer-salawat{font-size:12px;color:var(--muted);line-height:2;margin-bottom:12px}
    .footer-salawat strong{color:var(--gold-l);display:block;font-size:13px;margin-bottom:4px}

  themeBtn.setAttribute('aria-label', dark ? 'فعال کردن حالت روشن' : 'فعال کردن حالت تیره');

/* ══════════════════════════════════════════

  <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.01 1.21 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>

function buildPhone(num, cc) {
  return '+' + cc + (num.startsWith('0') ? num.slice(1) : num);
}

function contactHTML(c, avatarEmoji = '👤') {
  const intl = buildPhone(c.phone, c.countryCode);
  return `
  <div class="c-item">
    <div class="c-avatar" aria-hidden="true">${avatarEmoji}</div>
    <div class="c-info">
      <div class="c-role">${c.role}</div>

      <a href="tel:${intl}" class="act act-call" aria-label="تماس با ${c.role}" title="تماس">
        ${PHONE_ICON}

      <a href="https://wa.me/${intl.replace('+','')}" target="_blank" rel="noopener"
         class="act act-wa" aria-label="پیام واتساپ به ${c.role}" title="واتساپ">
        ${WA_ICON}

      <button class="act act-cp" onclick="copyNum('${c.phone}',this)"
              aria-label="کپی شماره ${c.role}" title="کپی شماره">
        ${COPY_ICON}

}

function sectionCard(opts) {
  const {icoClass, icoEmoji, title, badge, badgeClass, address, mapNeshan, mapGoogle, contacts} = opts;
  let html = `
  <div class="sec-card">
    <div class="sec-head">
      <div class="sec-ico ${icoClass}" aria-hidden="true">${icoEmoji}</div>
      <div class="sec-info"><h3>${title}</h3></div>
      <span class="badge ${badgeClass}">${badge}</span>
    </div>`;

  if (address) {
    html += `
    <div class="addr-row">
      <div class="addr-ico" aria-hidden="true">📍</div>
      <div class="addr-body">
        <div class="addr-lbl">آدرس</div>
        <div class="addr-txt">${address}</div>
      </div>
    </div>`;
  }

  if (mapNeshan || mapGoogle) {
    html += `<div class="map-row">`;
    if (mapNeshan) html += `<a href="${mapNeshan}" target="_blank" rel="noopener" class="map-btn map-n">🗺️ نقشه نشان</a>`;
    if (mapGoogle) html += `<a href="${mapGoogle}" target="_blank" rel="noopener" class="map-btn map-g">🌍 گوگل مپ</a>`;
    html += `</div>`;
  }

  if (contacts && contacts.length > 0) {
    html += `<div class="divider-lbl" aria-label="شماره‌های تماس">شماره‌های تماس</div>`;
    html += `<div class="contacts" role="list">`;
    contacts.forEach(c => { html += contactHTML(c); });
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

/* ══════════════════════════════════════════
   RENDER from CARAVAN_DATA
══════════════════════════════════════════ */
function render() {
  // update date
  document.getElementById('updateDate').textContent = CARAVAN_DATA.lastUpdate || '—';

  // insurance
  const ins = CARAVAN_DATA.insurance;
  if (ins) {
    const insEl = document.getElementById('globalInsurance');
    let rows = '';
    ins.contacts.forEach(c => {
      const intl = buildPhone(c.phone, c.countryCode);
      rows += `
      <div class="gin-row">
        <div class="gin-avatar" aria-hidden="true">🧑‍💼</div>
        <div class="gin-info">
          <div class="gin-role">${c.role}</div>
          <div class="gin-phone" dir="ltr">${c.phone}</div>
          ${c.name ? `<div class="gin-name">${c.name}</div>` : ''}
        </div>
        <div class="gin-acts">
          <a href="tel:${intl}" class="act act-call" aria-label="تماس" title="تماس">${PHONE_ICON}</a>
          <a href="https://wa.me/${intl.replace('+','')}" target="_blank" rel="noopener"
             class="act act-wa" aria-label="واتساپ" title="واتساپ">${WA_ICON}</a>
          <button class="act act-cp" onclick="copyNum('${c.phone}',this)"
                  aria-label="کپی شماره" title="کپی">${COPY_ICON}</button>
        </div>
      </div>`;
    });

    insEl.innerHTML = `
    <div class="global-ins">
      <div class="global-ins-head">
        <div class="global-ins-ico" aria-hidden="true">📋</div>
        <div class="global-ins-title">${ins.title}</div>
        <span class="global-badge">مشترک</span>
      </div>
      <div class="global-ins-body">${rows}</div>
    </div>`;
  }

  // tabs + city sections
  const tabList = document.getElementById('tabList');
  const mainContent = document.getElementById('mainContent');
  let tabsHTML = '';
  let sectionsHTML = '';

  CARAVAN_DATA.cities.forEach((city, idx) => {
    const isFirst = idx === 0;
    tabsHTML += `
    <button class="tab ${isFirst ? 'active' : ''}" id="tab-${city.id}"
            role="tab" aria-selected="${isFirst}"
            aria-controls="sec-${city.id}"
            onclick="switchTab('${city.id}')"
            onkeydown="handleTabKey(event,'${city.id}')">
      <span class="tab-icon" aria-hidden="true">${city.icon}</span>${city.name}
    </button>`;

    let cityHTML = `
    <div class="city-sec ${isFirst ? 'active' : ''}" id="sec-${city.id}"
         role="tabpanel" aria-labelledby="tab-${city.id}">
      <div class="city-hero">
        <div class="hero-name">${city.name}</div>
        <div class="hero-arabic">${city.arabic}</div>
      </div>`;

    // HQ
    if (city.hq) {
      cityHTML += sectionCard({
        icoClass: 'ico-hq', icoEmoji: '🏢',
        title: city.hq.title, badge: 'ستاد', badgeClass: 'badge-gold',
        address: city.hq.address,
        mapNeshan: city.hq.mapNeshanUrl, mapGoogle: city.hq.mapGoogleUrl,
        contacts: city.hq.contacts
      });
    }

    // Clinic
    if (city.clinic) {
      cityHTML += sectionCard({
        icoClass: 'ico-clinic', icoEmoji: '🏥',
        title: city.clinic.title, badge: 'درمانگاه', badgeClass: 'badge-green',
        address: city.clinic.address,
        mapNeshan: city.clinic.mapNeshanUrl, mapGoogle: city.clinic.mapGoogleUrl,
        contacts: city.clinic.contacts
      });
    }

    // Consulate
    if (city.consulate) {
      cityHTML += sectionCard({
        icoClass: 'ico-consulate', icoEmoji: '🏛️',
        title: city.consulate.title, badge: 'کنسولگری', badgeClass: 'badge-ruby',
        address: city.consulate.address || null,
        mapNeshan: city.consulate.mapNeshanUrl, mapGoogle: city.consulate.mapGoogleUrl,
        contacts: city.consulate.contacts
      });
    }

    cityHTML += `</div>`;
    sectionsHTML += cityHTML;
  });

  tabList.innerHTML = tabsHTML;
  mainContent.innerHTML = sectionsHTML + footerHTML();

  // try geolocation to pre-select city
  tryGeoTab();
}

function footerHTML() {

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
function switchTab(cityId) {
  document.querySelectorAll('.city-sec').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('active');
    t.setAttribute('aria-selected','false');
  });
  const sec = document.getElementById('sec-' + cityId);
  const tab = document.getElementById('tab-' + cityId);
  if (sec) sec.classList.add('active');
  if (tab) { tab.classList.add('active'); tab.setAttribute('aria-selected','true'); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function handleTabKey(e, cityId) {
  const tabs = Array.from(document.querySelectorAll('.tab'));
  const idx = tabs.findIndex(t => t.id === 'tab-' + cityId);
  if (e.key === 'ArrowRight' && idx > 0) { tabs[idx-1].click(); tabs[idx-1].focus(); }
  if (e.key === 'ArrowLeft' && idx < tabs.length-1) { tabs[idx+1].click(); tabs[idx+1].focus(); }
}

/* ══════════════════════════════════════════
   GEOLOCATION auto-tab
══════════════════════════════════════════ */
const CITY_COORDS = {
  najaf:     { lat: 32.003, lon: 44.335 },
  karbala:   { lat: 32.616, lon: 44.024 },
  kadhimiya: { lat: 33.380, lon: 44.338 }
};

function tryGeoTab() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    let nearest = null, minDist = Infinity;
    Object.entries(CITY_COORDS).forEach(([id, c]) => {
      const d = Math.hypot(lat - c.lat, lon - c.lon);
      if (d < minDist) { minDist = d; nearest = id; }
    });
    if (nearest && minDist < 1.5) switchTab(nearest);
  }, () => {}, { timeout: 5000 });
}

/* ══════════════════════════════════════════
   EMERGENCY accordion
══════════════════════════════════════════ */
function toggleEmergency() {
  const el = document.getElementById('emergency');
  const btn = document.getElementById('emergencyBtn');
  const body = document.getElementById('eBody');
  const open = el.classList.toggle('open');
  btn.setAttribute('aria-expanded', open);
  body.setAttribute('aria-hidden', !open);
}

/* ══════════════════════════════════════════
   COPY
══════════════════════════════════════════ */
function copyNum(num, btn) {
  navigator.clipboard.writeText(num).then(() => {
    btn.innerHTML = '<svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
    btn.classList.add('done');
    showToast('شماره کپی شد ✅');
    setTimeout(() => {
      btn.innerHTML = COPY_ICON;
      btn.classList.remove('done');
    }, 2200);
  }).catch(() => showToast('خطا در کپی'));
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ══════════════════════════════════════════
   SEARCH
══════════════════════════════════════════ */
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchResults = document.getElementById('searchResults');
const srBody = document.getElementById('srBody');

function getAllContacts() {
  const list = [];
  CARAVAN_DATA.cities.forEach(city => {
    ['hq','clinic','consulate'].forEach(sec => {
      if (!city[sec]) return;
      (city[sec].contacts || []).forEach(c => {
        list.push({ ...c, cityName: city.name, sectionTitle: city[sec].title });
      });
    });
  });
  (CARAVAN_DATA.insurance?.contacts || []).forEach(c => {
    list.push({ ...c, cityName: 'بیمه مشترک', sectionTitle: CARAVAN_DATA.insurance.title });
  });
  return list;
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.classList.toggle('show', q.length > 0);
  if (!q) { searchResults.classList.remove('show'); return; }

  const results = getAllContacts().filter(c =>
    c.phone.includes(q) || c.role.includes(q) || (c.name && c.name.includes(q)) ||
    c.cityName.includes(q) || c.sectionTitle.includes(q)
  );

  if (!results.length) {
    srBody.innerHTML = `<div class="sr-empty">نتیجه‌ای پیدا نشد</div>`;
  } else {
    srBody.innerHTML = results.map(c => {
      const intl = buildPhone(c.phone, c.countryCode);
      return `
      <div class="c-item">
        <div class="c-avatar" aria-hidden="true">👤</div>
        <div class="c-info">
          <div class="c-role">${c.cityName} · ${c.role}</div>
          <div class="c-phone" dir="ltr">${c.phone}</div>
          ${c.name ? `<div class="c-name">${c.name}</div>` : ''}
        </div>
        <div class="c-acts">
          <a href="tel:${intl}" class="act act-call" aria-label="تماس">${PHONE_ICON}</a>
          <a href="https://wa.me/${intl.replace('+','')}" target="_blank" rel="noopener"
             class="act act-wa" aria-label="واتساپ">${WA_ICON}</a>
          <button class="act act-cp" onclick="copyNum('${c.phone}',this)"
                  aria-label="کپی شماره">${COPY_ICON}</button>
        </div>
      </div>`;
    }).join('');
  }
  searchResults.classList.add('show');
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('show');
  searchResults.classList.remove('show');
  searchInput.focus();
});

/* ══════════════════════════════════════════
   QR CODE (lazy loaded)
══════════════════════════════════════════ */
let qrDone = false;
function showQR() {
  const url = window.location.href.split('?')[0].split('#')[0];
  document.getElementById('qrUrl').textContent = url;
  document.getElementById('qrOverlay').classList.add('open');

  if (!qrDone) {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    script.onload = () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      new QRCode(document.getElementById('qrcode'), {
        text: url, width: 200, height: 200,
        colorDark: isDark ? '#FFFFFF' : '#0A1F14',
        colorLight: isDark ? '#133523' : '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.H
      });
      qrDone = true;
    };
    document.head.appendChild(script);
  }
}

function closeQR() {
  document.getElementById('qrOverlay').classList.remove('open');
}
document.getElementById('qrOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeQR();
});

/* ══════════════════════════════════════════
   SHARE
══════════════════════════════════════════ */
function shareApp() {
  const url = window.location.href.split('?')[0].split('#')[0];
  if (navigator.share) {
    navigator.share({
      title: 'راهنمای کاروان عراق',
      text: 'اطلاعات تماس ستادها و درمانگاه‌های ایرانی در عراق',
      url
    }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('لینک کپی شد 🔗'));
  }
}

/* ══════════════════════════════════════════
   PWA INSTALL
══════════════════════════════════════════ */
let deferredPrompt;
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  if (isStandalone) return;
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
  if (outcome === 'accepted') showToast('برنامه نصب شد ✅');
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
  showToast('نصب با موفقیت انجام شد ✅');
});

/* ══════════════════════════════════════════
   SWIPE to change city
══════════════════════════════════════════ */
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) < 60) return;
  const tabs = Array.from(document.querySelectorAll('.tab'));
  const activeIdx = tabs.findIndex(t => t.classList.contains('active'));
  if (dx < 0 && activeIdx < tabs.length - 1) tabs[activeIdx + 1].click(); // swipe left → next
  if (dx > 0 && activeIdx > 0) tabs[activeIdx - 1].click();               // swipe right → prev
}, { passive: true });

/* ══════════════════════════════════════════
   SERVICE WORKER
══════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
render();
</script>
</body>
</html>
