<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>راهنمای کاروان | عراق</title>
  <meta name="description" content="راهنمای دیجیتال مدیران کاروان در عراق – ستادها، درمانگاه‌ها، شماره‌های تماس">
  <meta name="theme-color" content="#E2F0E6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="کاروان عراق">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="app-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root {
      --bg:           #0A1F14;
      --surface:      #0E2A1C;
      --card:         #133523;
      --card2:        #16482F;
      --gold:         #2E7D5E;
      --gold-l:       #3A9B74;
      --gold-dim:     rgba(46,125,94,0.12);
      --gold-dim2:    rgba(46,125,94,0.06);
      --emerald:      #1A7A4E;
      --emerald-l:    #2A9D6E;
      --ruby:         #B83232;
      --ruby-l:       #E74C3C;
      --blue-l:       #5A9CF5;
      --green-wa:     #25D366;
      --text:         #F5F5F0;
      --muted:        #9BBFAE;
      --dim:          #5A8A72;
      --border:       rgba(46,125,94,0.20);
      --border-s:     rgba(46,125,94,0.35);
      --shadow:       0 6px 28px rgba(0,0,0,0.5);
      --r:            16px;
      --r-sm:         10px;
      --font:         'Vazirmatn', sans-serif;
    }
    [data-theme="light"] {
      --bg:       #F0F7F2;
      --surface:  #E2F0E6;
      --card:     #FFFFFF;
      --card2:    #F4FBF6;
      --gold:     #2E7D5E;
      --gold-l:   #3A9B74;
      --gold-dim: rgba(46,125,94,0.10);
      --gold-dim2:rgba(46,125,94,0.05);
      --emerald-l:#2A9D6E;
      --text:     #0A2A1A;
      --muted:    #3A6B52;
      --dim:      #6B9B7F;
      --border:   rgba(46,125,94,0.20);
      --border-s: rgba(46,125,94,0.30);
      --shadow:   0 4px 20px rgba(0,0,0,0.08);
    }

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{
      font-family:var(--font);
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
    }

    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='rgba(46,125,94,0.08)' stroke-width='0.8'%3E%3Cpolygon points='50%2C8 59%2C35 88%2C35 65%2C53 74%2C80 50%2C62 26%2C80 35%2C53 12%2C35 41%2C35'/%3E%3Ccircle cx='50' cy='50' r='22'/%3E%3C/g%3E%3C/svg%3E");
      background-size:100px 100px;
    }
    body::after{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 5%,rgba(46,125,94,0.06) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 95%,rgba(46,125,94,0.05) 0%,transparent 60%);
    }

    .app-wrapper{
      position:relative;z-index:1;
      max-width:480px;margin:0 auto;
      min-height:100vh;display:flex;flex-direction:column;
    }

    .header{
      position:sticky;top:0;z-index:100;
      padding:14px 14px 6px;
      background:linear-gradient(180deg,var(--bg) 75%,transparent);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    }
    .header-inner{
      display:flex;align-items:center;justify-content:space-between;
      background:var(--surface);border:1px solid var(--border-s);
      border-radius:var(--r);padding:11px 14px;
      box-shadow:var(--shadow);
    }
    .header-brand{display:flex;align-items:center;gap:10px}
    .brand-icon{
      width:42px;height:42px;border-radius:12px;
      background:linear-gradient(135deg,var(--gold) 0%,var(--gold-l) 100%);
      display:flex;align-items:center;justify-content:center;font-size:22px;
      box-shadow:0 2px 12px rgba(46,125,94,0.35);flex-shrink:0;
    }
    .brand-text h1{font-size:14px;font-weight:800;color:var(--text);line-height:1.2}
    .brand-text p{font-size:10.5px;color:var(--muted);font-weight:400;margin-top:1px}
    .header-actions{display:flex;gap:7px}
    .icon-btn{
      width:36px;height:36px;border:1px solid var(--border);
      border-radius:9px;background:var(--card);color:var(--muted);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:15px;transition:all .2s;
    }
    .icon-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}

    .install-banner{
      display:none;margin:0 14px 8px;
      background:linear-gradient(135deg,rgba(46,125,94,0.13),rgba(46,125,94,0.06));
      border:1px solid var(--border-s);border-radius:var(--r-sm);
      padding:11px 13px;align-items:center;gap:11px;
    }
    .install-banner.show{display:flex}
    .install-text{flex:1;font-size:11.5px;color:var(--muted);line-height:1.55}
    .install-text strong{display:block;font-size:12.5px;color:var(--gold);margin-bottom:2px}
    .install-btn{
      padding:8px 14px;background:var(--gold);color:#FFFFFF;
      border:none;border-radius:8px;font-family:var(--font);
      font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;
      transition:background .2s;
    }
    .install-btn:hover{background:var(--gold-l)}

    .emergency{
      margin:0 14px 8px;
      background:linear-gradient(135deg,rgba(183,50,50,0.13),rgba(183,50,50,0.07));
      border:1px solid rgba(183,50,50,0.28);border-radius:var(--r-sm);overflow:hidden;
    }
    .emergency-head{
      display:flex;align-items:center;justify-content:space-between;
      padding:11px 14px;cursor:pointer;user-select:none;
    }
    .emergency-label{
      display:flex;align-items:center;gap:8px;
      font-size:12.5px;font-weight:700;color:var(--ruby-l);
    }
    .e-pulse{
      width:8px;height:8px;background:var(--ruby-l);border-radius:50%;
      animation:epulse 1.6s infinite;
    }
    @keyframes epulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.75)}}
    .emergency-arrow{color:var(--ruby-l);font-size:11px;transition:transform .3s}
    .emergency.open .emergency-arrow{transform:rotate(180deg)}
    .emergency-body{display:none;padding:0 14px 13px}
    .emergency.open .emergency-body{display:block}
    .e-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .e-item{
      background:rgba(183,50,50,0.09);border:1px solid rgba(183,50,50,0.18);
      border-radius:8px;padding:10px;text-align:center;
    }
    .e-label{font-size:10px;color:rgba(231,76,60,.75);margin-bottom:3px}
    .e-num{font-size:20px;font-weight:900;color:var(--ruby-l);letter-spacing:1px}

    .tabs-wrap{
      padding:0 14px;margin-bottom:10px;
      position:sticky;top:76px;z-index:90;
    }
    .tabs{
      display:flex;gap:5px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r);padding:5px;
      box-shadow:var(--shadow);
    }
    .tab{
      flex:1;padding:9px 4px;border:none;border-radius:9px;
      background:transparent;color:var(--muted);
      font-family:var(--font);font-size:11.5px;font-weight:600;
      cursor:pointer;transition:all .22s;display:flex;flex-direction:column;
      align-items:center;gap:2px;line-height:1.2;
    }
    .tab-icon{font-size:17px}
    .tab.active{
      background:linear-gradient(135deg,var(--gold),var(--gold-l));
      color:#FFFFFF;box-shadow:0 2px 14px rgba(46,125,94,0.32);
    }

    .content{flex:1;padding:0 14px 110px}
    .city-sec{display:none}
    .city-sec.active{display:block;animation:fadeUp .28s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .city-hero{
      margin-bottom:14px;padding:18px 16px;
      background:linear-gradient(135deg,var(--surface),var(--card2));
      border:1px solid var(--border-s);border-radius:var(--r);
      text-align:center;position:relative;overflow:hidden;
    }
    .city-hero::before{
      content:'';position:absolute;top:-40px;right:-40px;
      width:130px;height:130px;border-radius:50%;
      background:radial-gradient(circle,rgba(46,125,94,0.12),transparent 70%);
    }
    .city-hero::after{
      content:'';position:absolute;bottom:-40px;left:-40px;
      width:100px;height:100px;border-radius:50%;
      background:radial-gradient(circle,rgba(46,125,94,0.08),transparent 70%);
    }
    .hero-name{font-size:24px;font-weight:900;color:var(--gold);margin-bottom:3px;position:relative;z-index:1}
    .hero-arabic{font-size:12px;color:var(--muted);font-weight:400;position:relative;z-index:1;line-height:1.6}

    .sec-card{
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--r);margin-bottom:14px;overflow:hidden;
      box-shadow:var(--shadow);
    }
    .sec-head{
      display:flex;align-items:center;gap:10px;padding:13px 15px;
      border-bottom:1px solid var(--border);
      background:linear-gradient(135deg,var(--card),var(--card2));
    }
    .sec-ico{
      width:38px;height:38px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
    }
    .ico-hq{background:linear-gradient(135deg,rgba(46,125,94,.18),rgba(46,125,94,.08))}
    .ico-clinic{background:linear-gradient(135deg,rgba(46,125,94,.18),rgba(46,125,94,.08))}
    .ico-ins{background:linear-gradient(135deg,rgba(90,156,245,.18),rgba(90,156,245,.08))}
    .sec-info{flex:1}
    .sec-info h3{font-size:13.5px;font-weight:700;color:var(--text)}
    .badge{
      font-size:10px;padding:2px 9px;border-radius:6px;font-weight:600;
      border:1px solid;flex-shrink:0;
    }
    .badge-gold{background:var(--gold-dim);color:var(--gold);border-color:var(--border-s)}
    .badge-green{background:rgba(46,125,94,.13);color:var(--emerald-l);border-color:rgba(46,125,94,.28)}
    .badge-blue{background:rgba(90,156,245,.12);color:var(--blue-l);border-color:rgba(90,156,245,.28)}

    .addr-row{
      display:flex;align-items:flex-start;gap:10px;
      padding:11px 15px;border-bottom:1px solid var(--border);
    }
    .addr-ico{
      width:28px;height:28px;border-radius:7px;background:var(--gold-dim);
      display:flex;align-items:center;justify-content:center;font-size:13px;
      flex-shrink:0;margin-top:1px;
    }
    .addr-lbl{font-size:10px;color:var(--dim);font-weight:500;margin-bottom:3px}
    .addr-txt{font-size:12.5px;color:var(--muted);line-height:1.75}

    .map-row{
      display:flex;gap:7px;padding:9px 15px;border-bottom:1px solid var(--border);
    }
    .map-btn{
      flex:1;padding:9px 6px;border-radius:9px;border:1px solid;
      background:transparent;font-family:var(--font);font-size:11px;font-weight:600;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      gap:5px;text-decoration:none;transition:all .18s;
    }
    .map-g{border-color:rgba(90,156,245,.28);color:var(--blue-l);background:rgba(90,156,245,.06)}
    .map-g:hover{background:rgba(90,156,245,.14);border-color:rgba(90,156,245,.5)}
    .map-n{border-color:var(--border-s);color:var(--gold);background:var(--gold-dim2)}
    .map-n:hover{background:var(--gold-dim);border-color:var(--gold)}

    .c-item{
      display:flex;align-items:center;gap:10px;
      padding:10px 15px;border-bottom:1px solid var(--border);
      transition:background .15s;
    }
    .c-item:last-child{border-bottom:none}
    .c-item:hover{background:var(--card2)}
    .c-avatar{
      width:36px;height:36px;border-radius:10px;
      background:var(--gold-dim2);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;
    }
    .c-info{flex:1;min-width:0}
    .c-role{font-size:10.5px;color:var(--dim);font-weight:500;margin-bottom:2px}
    .c-name{font-size:11.5px;color:var(--muted);margin-top:1px}
    .c-phone{font-size:14.5px;font-weight:700;color:var(--text);direction:ltr;text-align:right;letter-spacing:.5px}
    .c-acts{display:flex;gap:5px;flex-shrink:0}
    .act{
      width:33px;height:33px;border-radius:8px;border:1px solid;
      background:transparent;cursor:pointer;display:flex;align-items:center;
      justify-content:center;text-decoration:none;transition:all .18s;font-size:15px;
    }
    .act-call{border-color:rgba(46,125,94,.3);color:var(--emerald-l)}
    .act-call:hover{background:rgba(46,125,94,.15);border-color:var(--emerald-l)}
    .act-wa{border-color:rgba(37,211,102,.28);color:var(--green-wa)}
    .act-wa:hover{background:rgba(37,211,102,.1);border-color:var(--green-wa)}
    .act-cp{border-color:var(--border);color:var(--muted)}
    .act-cp:hover,.act-cp.done{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}

    .no-c{
      padding:14px 15px;font-size:11px;color:var(--dim);
      text-align:center;font-style:italic;border-top:1px solid var(--border);
    }

    .bot-bar{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:480px;z-index:100;
      padding:10px 14px max(12px,env(safe-area-inset-bottom)) 14px;
      background:linear-gradient(0,var(--bg) 65%,transparent);
    }
    .bot-inner{display:flex;gap:8px}
    .bot-btn{
      flex:1;padding:13px;border-radius:var(--r-sm);border:1px solid var(--border);
      background:var(--card);font-family:var(--font);font-size:12.5px;font-weight:600;
      color:var(--muted);cursor:pointer;display:flex;align-items:center;
      justify-content:center;gap:6px;transition:all .2s;box-shadow:var(--shadow);
    }
    .bot-btn:hover,.bot-btn:active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
    .bot-btn.prime{
      background:linear-gradient(135deg,var(--gold),var(--gold-l));
      color:#FFFFFF;border-color:transparent;font-weight:800;
      box-shadow:0 3px 16px rgba(46,125,94,0.3);
    }
    .bot-btn.prime:hover{box-shadow:0 4px 20px rgba(46,125,94,0.45)}

    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.72);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      z-index:200;display:none;align-items:flex-end;justify-content:center;
    }
    .overlay.open{display:flex}
    .modal{
      background:var(--surface);border:1px solid var(--border-s);
      border-radius:22px 22px 0 0;width:100%;max-width:480px;
      padding:20px 22px max(22px,env(safe-area-inset-bottom)) 22px;
      animation:slideUp .3s ease;
    }
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-handle{
      width:38px;height:4px;background:var(--border-s);border-radius:2px;margin:0 auto 18px;
    }
    .modal-title{font-size:16px;font-weight:800;color:var(--text);text-align:center;margin-bottom:18px}
    .qr-wrap{
      display:flex;justify-content:center;padding:16px;
      background:#fff;border-radius:14px;margin-bottom:12px;
    }
    .qr-url{
      text-align:center;font-size:10.5px;color:var(--muted);direction:ltr;
      word-break:break-all;margin-bottom:16px;
    }
    .modal-close{
      width:100%;padding:13px;border-radius:11px;border:1px solid var(--border);
      background:var(--card);color:var(--muted);font-family:var(--font);
      font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;
    }
    .modal-close:hover{border-color:var(--gold);color:var(--gold)}

    .toast{
      position:fixed;bottom:95px;left:50%;
      transform:translateX(-50%) translateY(16px);
      background:var(--card);border:1px solid var(--border-s);
      border-radius:100px;padding:9px 20px;
      font-size:12.5px;font-weight:700;color:var(--gold);
      box-shadow:var(--shadow);opacity:0;transition:all .3s;
      z-index:300;white-space:nowrap;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:3px}

    .divider-lbl{
      padding:10px 15px 5px;font-size:10px;color:var(--dim);font-weight:600;
      letter-spacing:.5px;text-transform:uppercase;border-top:1px solid var(--border);
    }

    .hajj-logo{
      width:48px;height:48px;border-radius:12px;object-fit:contain;
      background:transparent;padding:6px;flex-shrink:0;
    }

    .global-ins{
      margin:0 14px 10px;
      background:linear-gradient(135deg,rgba(90,156,245,0.10),rgba(90,156,245,0.05));
      border:1px solid rgba(90,156,245,0.25);border-radius:var(--r-sm);overflow:hidden;
    }
    .global-ins-head{
      display:flex;align-items:center;gap:9px;padding:10px 13px;
      border-bottom:1px solid rgba(90,156,245,0.15);
    }
    .global-ins-ico{width:32px;height:32px;border-radius:8px;background:rgba(90,156,245,0.14);
      display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .global-ins-title{font-size:12px;font-weight:700;color:var(--blue-l);flex:1}
    .global-badge{font-size:9.5px;padding:2px 8px;border-radius:5px;font-weight:600;
      background:rgba(90,156,245,0.12);color:var(--blue-l);border:1px solid rgba(90,156,245,0.28);}
    .global-ins-body{padding:9px 13px}
    .gin-row{display:flex;align-items:center;gap:10px}
    .gin-avatar{width:34px;height:34px;border-radius:9px;background:rgba(90,156,245,0.10);
      border:1px solid rgba(90,156,245,0.2);display:flex;align-items:center;justify-content:center;
      font-size:15px;flex-shrink:0;}
    .gin-info{flex:1;min-width:0}
    .gin-role{font-size:10px;color:var(--dim);margin-bottom:2px}
    .gin-name{font-size:11px;color:var(--muted)}
    .gin-phone{font-size:14px;font-weight:700;color:var(--text);direction:ltr;text-align:right;letter-spacing:.5px}
    .gin-acts{display:flex;gap:5px;flex-shrink:0}

    .ico-consulate{background:linear-gradient(135deg,rgba(184,50,50,.18),rgba(184,50,50,.08))}
    .badge-ruby{background:rgba(184,50,50,.13);color:#F08080;border-color:rgba(184,50,50,.28)}

    .footer{
      margin:20px 14px 130px;
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--r);padding:18px 16px;text-align:center;
    }
    .footer-bismillah{font-size:15px;color:var(--gold);font-weight:700;margin-bottom:10px;letter-spacing:.5px;}
    .footer-salawat{font-size:12px;color:var(--muted);line-height:2;margin-bottom:12px;}
    .footer-salawat strong{color:var(--gold-l);display:block;font-size:13px;margin-bottom:4px}
    .footer-divider{height:1px;background:var(--border);margin:12px 0;}
    .footer-dev{font-size:11px;color:var(--dim);line-height:1.9;}
    .footer-dev strong{color:var(--gold);font-weight:700}
  </style>
</head>
<body>
<div class="app-wrapper">

  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 30 28" xmlns="http://www.w3.org/2000/svg" width="28" height="26">
            <rect x="1" y="13" width="5" height="13" rx="2.5" fill="#C9A835"/>
            <ellipse cx="3.5" cy="12" rx="3.5" ry="2.2" fill="#C9A835"/>
            <rect x="2.5" y="5" width="2" height="8" rx="1" fill="#C9A835"/>
            <rect x="24" y="13" width="5" height="13" rx="2.5" fill="#C9A835"/>
            <ellipse cx="26.5" cy="12" rx="3.5" ry="2.2" fill="#C9A835"/>
