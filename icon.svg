<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="36" fill="#070B18"/>
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%">
      <stop offset="0%" stop-color="#C9A835" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#070B18" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Mosque dome -->
  <ellipse cx="96" cy="82" rx="38" ry="34" fill="none" stroke="#C9A835" stroke-width="3"/>
  <rect x="58" y="82" width="76" height="6" rx="3" fill="#C9A835"/>
  <!-- Minaret left -->
  <rect x="48" y="60" width="10" height="36" rx="4" fill="#C9A835" opacity=".7"/>
  <ellipse cx="53" cy="58" rx="6" ry="4" fill="#C9A835" opacity=".7"/>
  <!-- Minaret right -->
  <rect x="134" y="60" width="10" height="36" rx="4" fill="#C9A835" opacity=".7"/>
  <ellipse cx="139" cy="58" rx="6" ry="4" fill="#C9A835" opacity=".7"/>
  <!-- Crescent on dome -->
  <path d="M96 52 A18 18 0 0 1 110 65 A12 12 0 0 0 96 52Z" fill="#C9A835"/>
  <!-- Base -->
  <rect x="40" y="118" width="112" height="8" rx="4" fill="#C9A835" opacity=".5"/>
  <!-- Star -->
  <text x="96" y="108" text-anchor="middle" font-size="28" fill="#C9A835">★</text>
  <!-- Persian text -->
  <text x="96" y="148" text-anchor="middle" font-size="13" fill="#C9A835" font-family="Arial" opacity=".8">کاروان عراق</text>
